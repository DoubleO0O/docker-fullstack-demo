<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Docker Fullstack Demo</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 50px auto;
    }
    .card {
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>Docker Fullstack Demo</h1>
  <p>获取数据库数据：</p>

  <button onclick="loadData()">刷新数据</button>

  <div id="list"></div>

  <script>
    async function loadData() {
      const res = await fetch("/api");
      const data = await res.json();

      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = item.content;
        list.appendChild(div);
      });
    }

    loadData();
  </script>

</body>
</html>
